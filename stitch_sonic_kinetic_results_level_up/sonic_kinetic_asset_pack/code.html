<div class="p-8 bg-[#0e0e13] text-[#f8f5fd] font-sans">

        <div class="space-y-2">

                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=500" class="w-full h-full object-cover" alt="Waveform Asset">
            </div>
            <p class="text-xs font-mono text-[#d394ff]/60 uppercase">hero_waveform.png</p>
        </div>

        <!-- Character 1 -->
        <div class="space-y-2">
            <div class="aspect-square rounded-xl overflow-hidden bg-[#131318] border border-[#d394ff]/20">

            <p class="text-xs font-mono text-[#d394ff]/60 uppercase">cyber_dj_01.png</p>
        </div>

        <!-- Environment -->

            <div class="aspect-square rounded-xl overflow-hidden bg-[#131318] border border-[#d394ff]/20">

            <p class="text-xs font-mono text-[#d394ff]/60 uppercase">ui_progress_bar.svg</p>

    <div class="mt-12 p-6 rounded-2xl bg-[#131318] border border-[#d394ff]/10">

            </div>
            <div class="flex items-center gap-2">
