<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sonic Kinetic - Gameplay</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .bg-pulse-glow {
            background: radial-gradient(circle at center, rgba(211, 148, 255, 0.08) 0%, transparent 70%);
        }
        .glass-panel {
            backdrop-filter: blur(16px);
            background: rgba(25, 25, 31, 0.6);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 min-h-screen overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e13]/80 backdrop-blur-xl shadow-[0_0_15px_rgba(211,148,255,0.1)]">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#d394ff] to-[#cb80ff] font-headline tracking-tight">Sonic Kinetic</span>
</div>
<div class="flex items-center gap-4">
<button class="text-[#f8f5fd]/60 hover:text-[#00fbfb] transition-colors duration-300 active:scale-95">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="text-[#f8f5fd]/60 hover:text-[#00fbfb] transition-colors duration-300 active:scale-95">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</div>
</header>
<main class="relative pt-16 pb-24 h-screen w-full flex flex-col items-center justify-between">
<!-- Ambient Pulse Background -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] bg-pulse-glow"></div>
<!-- Dynamic Soundwave Visualization (Background Decorative) -->
<div class="absolute bottom-0 left-0 w-full h-64 opacity-20 flex items-end justify-around px-4">
<div class="w-1 bg-primary h-32 rounded-full"></div>
<div class="w-1 bg-secondary h-48 rounded-full"></div>
<div class="w-1 bg-tertiary h-24 rounded-full"></div>
<div class="w-1 bg-primary h-56 rounded-full"></div>
<div class="w-1 bg-secondary h-40 rounded-full"></div>
<div class="w-1 bg-tertiary h-64 rounded-full"></div>
<div class="w-1 bg-primary h-32 rounded-full"></div>
<div class="w-1 bg-secondary h-44 rounded-full"></div>
</div>
</div>
<!-- Gameplay Header (Score & Phase) -->
<div class="z-10 w-full max-w-2xl px-6 mt-8">
<div class="flex justify-between items-end mb-8">
<div>
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant block mb-1">Current Phase</span>
<div class="flex items-center gap-3">
<span class="text-4xl font-headline font-black text-secondary tracking-tighter">TAP</span>
<span class="material-symbols-outlined text-secondary animate-pulse">keyboard_double_arrow_right</span>
</div>
</div>
<div class="text-right">
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant block mb-1">Streak</span>
<span class="text-5xl font-headline font-black text-tertiary italic">124</span>
</div>
</div>
<!-- Accuracy Toast (Center Overlay) -->
<div class="flex justify-center h-12">
<div class="px-6 py-2 rounded-full bg-tertiary/10 border border-tertiary/20 backdrop-blur-md">
<span class="font-headline font-bold text-tertiary tracking-widest text-lg uppercase">Perfect</span>
</div>
</div>
</div>
<!-- Central Kinetic Interactive Area -->
<div class="z-10 relative flex flex-col items-center justify-center">
<!-- Rhythm Ring Visualizers -->
<div class="absolute w-80 h-80 rounded-full border-2 border-primary/20 scale-110 opacity-50"></div>
<div class="absolute w-80 h-80 rounded-full border-2 border-secondary/10 scale-125 opacity-30"></div>
<!-- Large Tap Button (The "Trigger Pad") -->
<button class="group relative w-64 h-64 rounded-full flex items-center justify-center transition-all duration-150 active:scale-90 overflow-hidden shadow-[0_0_50px_rgba(211,148,255,0.15)]">
<!-- Inner Glow Layers -->
<div class="absolute inset-0 bg-gradient-to-br from-primary to-primary-dim opacity-90 group-active:opacity-100"></div>
<div class="absolute inset-1 rounded-full bg-surface-container-lowest/30 backdrop-blur-sm"></div>
<div class="absolute inset-4 rounded-full border-2 border-white/20"></div>
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-white text-7xl font-light mb-2" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="font-headline font-bold text-white tracking-[0.2em] uppercase text-sm">Hit Beat</span>
</div>
<!-- Particle/Ripple Effect Decor -->
<div class="absolute inset-0 rounded-full border-[10px] border-secondary/30 opacity-0 group-active:opacity-100 group-active:scale-110 transition-all duration-300"></div>
</button>
<!-- Listen Phase Preview (Lower opacity during Tap) -->
<div class="mt-12 flex gap-2 items-center opacity-40">
<div class="w-1.5 h-6 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-10 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-16 bg-secondary rounded-full"></div>
<div class="w-1.5 h-8 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-12 bg-primary-fixed-dim rounded-full"></div>
</div>
</div>
<!-- Bottom Controls & Progress -->
<div class="z-10 w-full max-w-4xl px-6 mb-12">
<!-- Track Info Card -->
<div class="glass-panel rounded-3xl p-6 flex items-center gap-6 shadow-2xl">
<div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0">
<img alt="Track Art" class="w-full h-full object-cover" data-alt="Abstract vibrant digital art with neon purple and blue soundwave patterns and geometric shapes on dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAabNpEdch4SgBgbi07ctTGaHUDcuREFCTJE7IiUASxu-Ca5r8hBCbT-xXxj1xcRckeZNoJxASYO1MUXQCWZIj0VV-Yd4T6_FJ61DPMZXUzzDcF6nFeLepXKp85-5pIk2RJL3eOQFPqVoiorVkYM7rkGcnKR2OVhsmtKLCDGeBe_0q5nhsTT-DTehKEyr9UB8KK5Kx87mwCtPeVp1O8zXxX2Nhp0VbcAM_q7YjfolguuUjG2a1aw2vkBDGNDDvio7G0zXZWCU_cQws"/>
</div>
<div class="flex-grow">
<h3 class="font-headline text-xl font-bold text-on-surface">Neon Horizon</h3>
<p class="font-body text-sm text-on-surface-variant font-medium">Kinetic Mind • 128 BPM</p>
</div>
<div class="flex flex-col items-end">
<span class="font-headline font-black text-2xl text-secondary">03:42</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Remaining</span>
</div>
</div>
<!-- Custom Waveform Slider -->
<div class="mt-8 relative h-12 flex items-center">
<div class="absolute inset-0 flex items-center justify-between gap-1 opacity-20">
<!-- Fake Waveform Background -->
<div class="flex-grow h-1 bg-surface-variant rounded-full overflow-hidden flex items-center px-1">
<div class="w-3/4 h-full bg-secondary-fixed-dim shadow-[0_0_8px_rgba(0,236,236,0.5)]"></div>
</div>
</div>
<!-- Interactive Progress Line -->
<div class="w-full h-1 bg-surface-variant rounded-full relative">
<div class="absolute left-0 top-0 h-full w-3/4 bg-gradient-to-r from-secondary-container to-secondary rounded-full"></div>
<!-- The Luminous Knob -->
<div class="absolute left-3/4 top-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-primary flex items-center justify-center shadow-[0_0_15px_rgba(211,148,255,0.6)]">
<div class="w-2 h-2 rounded-full bg-white"></div>
</div>
</div>
</div>
</div>
</main>
<!-- Navigation Shell Anchor -->
<nav class="fixed bottom-0 left-0 w-full z-50 rounded-t-[2rem] bg-[#131318]/90 backdrop-blur-2xl border-t border-[#48474d]/15 shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
<div class="flex justify-around items-center px-4 pb-6 pt-2 w-full max-w-lg mx-auto">
<a class="flex flex-col items-center justify-center text-[#f8f5fd]/40 py-2 px-4 hover:text-[#00fbfb] transition-all duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#f8f5fd]/40 py-2 px-4 hover:text-[#00fbfb] transition-all duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="library_music">library_music</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-widest mt-1">Tracks</span>
</a>
<a class="flex flex-col items-center justify-center text-[#d394ff] bg-[#1f1f26] rounded-2xl py-2 px-4 shadow-[0_0_10px_rgba(211,148,255,0.2)] active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="graphic_eq" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-widest mt-1">Play</span>
</a>
<a class="flex flex-col items-center justify-center text-[#f8f5fd]/40 py-2 px-4 hover:text-[#00fbfb] transition-all duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-widest mt-1">Stats</span>
</a>
</div>
</nav>
</body></html>
